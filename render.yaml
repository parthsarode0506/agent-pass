services:
  - type: web
    name: agentid-backend
    env: python
    region: oregon
    plan: free
    buildCommand: >
      cd frontend && npm ci && npm run build && cd .. &&
      pip install -r functions/requirements.txt
    startCommand: cd functions && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_CREDENTIALS_B64
        sync: false
      - key: GCLOUD_PROJECT
        value: rift-2ef56
      - key: PYTHON_VERSION
        value: "3.11"
    autoDeploy: true
